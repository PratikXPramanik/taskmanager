version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=devsecretchangeme
      - NODE_ENV=development
      - DB_PATH=/data/taskmanager.db
    volumes:
      - db_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: "http://localhost:5000/api"
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
